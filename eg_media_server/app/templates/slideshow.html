<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Diashow {{ dir }}</title>
  <style>
    body { font-family: sans-serif; text-align: center; }
    img { max-width: 90%; max-height: 80vh; margin: 20px auto; display: block; }
  </style>
</head>
<body>
  <h1>Diashow {{ dir }}</h1>
  <h3 id="subtitle"></h3>
  <div>
    <button onclick="history.back()">Zurück zum Verzeichnis</button>
    <button onclick="prevImage()">Zurück</button>
    <button onclick="nextImage()">Weiter</button>
    <button id="autoplay" onclick="toggleAutoplay()">Start Diashow</button>
  </div>

  <img id="slideshow" src="{{ images[0] }}" alt="Slideshow Bild">

  <script>
    const img = document.getElementById("slideshow");
    const slides = JSON.parse('{{ images|tojson|safe }}');
    let current = 0;
    let autoplay = null;
    let interval = 3000; // Geschwindigkeit in ms (konfigurierbar)
    showImage(0);

    function showImage(index) {
      current = (index + slides.length) % slides.length;
      const subtitle = document.getElementById("subtitle");
      subtitle.textContent = `${current} von ${slides.length} : ${slides[current].split('/').pop()}`;
      img.src = slides[current];
    }

    function nextImage() {
      showImage(current + 1);
    }

    function prevImage() {
      showImage(current - 1);
    }

    function toggleAutoplay() {
      const btn = document.getElementById("autoplay");
      if (autoplay) {
        clearInterval(autoplay);
        btn.innerText = "Start Diashow"
        autoplay = null;
      } else {
        autoplay = setInterval(nextImage, interval);
        btn.innerText = "Stop Diashow"
      }
    }
  </script>
</body>
</html>
